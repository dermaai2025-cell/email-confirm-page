<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
</head>

<body style="text-align:center; margin-top:50px; font-family:sans-serif;">
  <h2>Reset your password 🔑</h2>
  <p>Please open the app to complete resetting your password.</p>

  <script>
    const hash = window.location.hash;

    // يحاول يفتح التطبيق
    window.location.href = "myapp://reset-password" + hash;

    // لو التطبيق مفتحش، يفضل الرسالة
  </script>
</body>
</html>
