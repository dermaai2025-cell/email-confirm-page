<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <script>
    // أول ما الصفحة تفتح
    window.onload = function () {
      const params = window.location.search;

      // 🔥 redirect للـ app
      window.location.href = "io.supabase.flutter://reset-callback" + params;
    };
  </script>
</head>
<body style="text-align:center; margin-top:50px; font-family:sans-serif;">
  <h2>Reset your password 🔑</h2>
  <p>Please open the app to complete resetting your password.</p>
</body>
</html>
